name: Build VNRP Launcher APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # Project chưa có Gradle Wrapper, nên CI cài đúng Gradle 8.9.
      # Android Gradle Plugin 8.7.x yêu cầu Gradle 8.9 và JDK 17.
      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'
          cache-provider: basic

      - name: Install Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "Không tìm thấy ANDROID_SDK_ROOT hoặc ANDROID_HOME"
            exit 1
          fi

          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager 2>/dev/null | head -n 1)"
          if [ -z "$SDKMANAGER" ]; then
            echo "Không tìm thấy sdkmanager trong $SDK_ROOT"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VNRP-Mobile-Launcher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
