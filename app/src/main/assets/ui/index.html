<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>VNRP Web UI test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(34,197,94,.25), transparent 45%);
      color: #f8fafc;
      font-family: system-ui, sans-serif;
    }
    .card {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      background: rgba(15,23,42,.88);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
    }
    h1 { margin: 0 0 10px; }
    p { color: #cbd5e1; }
    #status { color: #86efac; font-weight: 700; }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>CEF Mobile test</h1>
    <p>Trên Android phần này chạy bằng WebView. Sau này UI này sẽ phủ lên bề mặt game.</p>
    <p id="status">Đang chờ bridge...</p>
    <button onclick="NativeGame.emit('launcher:download', '{}')">Quay lại launcher</button>
    <button onclick="NativeGame.close()">Đóng giao diện</button>
  </main>

  <script>
    window.game = {
      receive(event, payload) {
        document.querySelector('#status').textContent = `${event}: ${payload.message ?? JSON.stringify(payload)}`;
      }
    };

    window.addEventListener('DOMContentLoaded', () => {
      if (window.NativeGame) {
        document.querySelector('#status').textContent = `Bridge OK · ${NativeGame.platform()}`;
        NativeGame.emit('ui:ready', '{}');
      } else {
        document.querySelector('#status').textContent = 'Không thấy NativeGame bridge';
      }
    });
  </script>
</body>
</html>
